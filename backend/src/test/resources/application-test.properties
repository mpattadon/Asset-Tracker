spring.datasource.url=jdbc:h2:mem:${random.uuid};DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/migration/V1__initial_schema.sql
spring.sql.init.data-locations=classpath:db/migration/V2__seed_reference_data.sql
asset-tracker.encryption.master-key=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
asset-tracker.fx.provider=stub
asset-tracker.sync.auto-sync-on-read=true
asset-tracker.auth.allow-dev-header-user=true
asset-tracker.market-data.provider=stub
asset-tracker.market-data.autostart=false
asset-tracker.app-host.private-enabled=false
asset-tracker.app-host.frontend-dist=../frontend/dist
asset-tracker.app-host.open-browser-on-ready=false
asset-tracker.legacy.portfolio-root=./target/test-portfolio-documents/${random.uuid}
