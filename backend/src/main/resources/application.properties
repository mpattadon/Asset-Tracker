spring.application.name=asset-tracker-backend
spring.config.import=optional:file:.env[.properties]

server.address=${SERVER_ADDRESS:127.0.0.1}
spring.datasource.url=${SQLITE_URL:jdbc:sqlite:./data/asset-tracker.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/migration/V1__initial_schema.sql
spring.sql.init.data-locations=classpath:db/migration/V2__seed_reference_data.sql

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

asset-tracker.auth.success-redirect=${AUTH_SUCCESS_REDIRECT:http://localhost:5173/}
asset-tracker.auth.failure-redirect=${AUTH_FAILURE_REDIRECT:http://localhost:5173/?auth=error}
asset-tracker.auth.allow-dev-header-user=${ALLOW_DEV_HEADER_USER:false}

asset-tracker.encryption.master-key=${ASSET_TRACKER_MASTER_KEY:ZGV2LWFzc2V0LXRyYWNrZXItbWFzdGVyLWtleS0zMmJ5dGVzIQ==}
asset-tracker.sync.auto-sync-on-read=${AUTO_SYNC_ON_READ:true}
asset-tracker.fx.provider=${FX_PROVIDER:frankfurter}
asset-tracker.fx.base-url=${FX_BASE_URL:https://api.frankfurter.app}

asset-tracker.market-data.provider=${MARKET_DATA_PROVIDER:sidecar}
asset-tracker.market-data.sidecar-base-url=${MARKET_DATA_SIDECAR_BASE_URL:http://127.0.0.1:9001}
asset-tracker.market-data.timeout-seconds=${MARKET_DATA_TIMEOUT_SECONDS:10}
asset-tracker.market-data.autostart=${MARKET_DATA_AUTOSTART:true}
asset-tracker.market-data.python-command=${MARKET_DATA_PYTHON_COMMAND:python}
asset-tracker.legacy.portfolio-root=${LEGACY_PORTFOLIO_ROOT:./portfolio-documents}
asset-tracker.app-host.private-enabled=${APP_PRIVATE_HOST_ENABLED:true}
asset-tracker.app-host.private-port=${APP_PRIVATE_HOST_PORT:4173}
asset-tracker.app-host.share-port=${APP_SHARE_PORT:4273}
asset-tracker.app-host.frontend-dist=${APP_FRONTEND_DIST:../frontend/dist}
asset-tracker.app-host.open-browser-on-ready=${APP_OPEN_BROWSER_ON_READY:false}
