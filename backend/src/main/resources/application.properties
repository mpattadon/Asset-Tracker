spring.application.name=asset-tracker-backend
spring.config.import=optional:file:.env[.properties]

asset-tracker.storage.root=./data
asset-tracker.alpaca.api-key=${ALPACA_API_KEY:}
asset-tracker.alpaca.secret-key=${ALPACA_SECRET_KEY:}
asset-tracker.alpaca.trading-base-url=${ALPACA_TRADING_BASE_URL:https://paper-api.alpaca.markets}
asset-tracker.alpaca.market-data-base-url=${ALPACA_MARKET_DATA_BASE_URL:https://data.alpaca.markets}
